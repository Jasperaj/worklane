<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile Preview — Worklane</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #f3f1ec;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    gap: 24px;
    color: #1a1a1a;
  }
  .header { text-align: center; }
  .header h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 500;
    font-size: 32px;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .header p {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #777;
  }
  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .controls button {
    background: #fff;
    border: 1px solid #d8d4ce;
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    color: #555;
    transition: all 0.18s;
    font-family: inherit;
  }
  .controls button:hover { border-color: #1a1a1a; color: #1a1a1a; }
  .controls button.active {
    background: #1a1a1a;
    border-color: #1a1a1a;
    color: #fff;
  }
  .frame-stage {
    margin-top: 8px;
  }
</style>
</head>
<body style="font-size: 17px">
  <div class="header">
    <h1>Mobile Preview</h1>
    <p>Worklane · responsive view</p>
  </div>

  <div class="controls" id="device-controls">
    <button data-w="402" data-h="874" class="active">iPhone 15 Pro · 402×874</button>
    <button data-w="390" data-h="844">iPhone 14 · 390×844</button>
    <button data-w="375" data-h="667">iPhone SE · 375×667</button>
    <button data-w="430" data-h="932">iPhone 15 Pro Max · 430×932</button>
  </div>

  <div class="frame-stage" id="frame-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [dim, setDim] = useState({ w: 402, h: 874 });

  useEffect(() => {
    const btns = document.querySelectorAll('#device-controls button');
    btns.forEach(b => {
      b.onclick = () => {
        btns.forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        setDim({ w: +b.dataset.w, h: +b.dataset.h });
      };
    });
  }, []);

  return (
    <IOSDevice width={dim.w} height={dim.h}>
      <iframe
        src="index.html"
        style={{
          width: '100%',
          height: '100%',
          border: 'none',
          background: '#f3f1ec',
          display: 'block',
        }}
        title="Worklane mobile"
      />
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('frame-root')).render(<App />);
</script>
</body>
</html>
